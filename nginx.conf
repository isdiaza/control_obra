server {
    listen 80;
    server_name localhost;

    # ── Static React app ──────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Supabase reverse proxy ─────────────────────────────────────────────
    # Browser calls HTTPS /supabase-api/* → nginx proxies HTTP to Supabase.
    # This eliminates the mixed-content block: browser ↔ HTTPS, nginx ↔ HTTP.
    location /supabase-api/ {
        proxy_pass http://control-obras-supabase-079695-76-13-101-174.sslip.io/;
        proxy_http_version 1.1;
        proxy_set_header Host control-obras-supabase-079695-76-13-101-174.sslip.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Allow CORS from the app origin
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer' always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
