server {
    listen 80;
    server_name localhost;

    # ── React app (static files) ───────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Supabase reverse proxy ─────────────────────────────────────────────
    # The browser calls https://controlobra.dibersa.com.mx/supabase-api/*
    # nginx proxies it internally to the HTTP Supabase service.
    # Result: browser uses HTTPS (same domain) → no mixed-content block.
    location /supabase-api/ {
        proxy_pass http://control-obras-supabase-079695-76-13-101-174.sslip.io/;
        proxy_http_version 1.1;
        proxy_set_header Host                control-obras-supabase-079695-76-13-101-174.sslip.io;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   https;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

